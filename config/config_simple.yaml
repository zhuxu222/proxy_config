
proxies:
  # 这是一个 VLESS + REALITY 的节点配置
- name: nube_1
  type: vless
  server: 3x-ui.npm.nube.zzxh.top   # 服务器 IP 或域名
  port: 13002                       # 代理端口
  uuid: 52fc1643-221c-4ba4-b070-b9f885c1f22f # 用户识别码
  udp: true                         # 开启 UDP 支持 (玩游戏、看视频、QUIC必备)
  xudp: true                        # 开启 XUDP (更高级的 UDP 转发，提升稳定性)
  skip-cert-verify: false           # 是否跳过证书严重 (为了安全建议 false)
  tls: true                         # 开启 TLS 加密
  client-fingerprint: chrome        # TLS 指纹模拟，伪装成 Chrome 浏览器流量特征
  servername: www.icloud.com        # SNI (Server Name Indication)，REALITY 用于伪装的目标域名
  network: tcp                      # 底层传输协议
  reality-opts:
    public-key: 3MDRxq_P94durEE-8yINSErT1GZRpUhoNGWu6adoMD4 # REALITY 公钥
    short-id: "747dbb93e1b2"        # REALITY 短 ID
  ip-version: ipv4-prefer           # 优先通过 IPv4 连接该节点
  tfo: false                        # 是否开启 TCP Fast Open (可能导致某些网络环境下断流，默认关)

#----------------------------------------------------------
# 代理组 (Proxy Groups)
# 用于实现自动测速、主备切换、手动选择和策略分流的逻辑组
# 支持四种主要类型：
#   - select:   手动选择节点（最常用）
#   - url-test: 自动并发测速并选择延迟最低的节点
#   - fallback: 按照顺序优先级选择可用的节点（主备容灾）
#   - load-balance: 负载均衡机制
#----------------------------------------------------------
proxy-groups:

# ---- 核心路由组 ----

# 自动测速组 (UrlTest)
# 每 600 秒测速一次，延迟波动在 150ms 以内不随意切换节点
- name: Auto - UrlTest
  type: url-test
  proxies:
  - nube_1
  url: http://cp.cloudflare.com/generate_204 # 测速目标网址，通常使用 204 HTTP 状态码的极速服务
  interval: 600
  tolerance: 150

# 全局出墙代理组 (Proxy)
# 绝大多数海外流量的归宿地，默认可以在 自动测速 / 直连 / 手动节点 中做出选择
- name: Proxy
  type: select
  proxies:
  - Auto - UrlTest
  - DIRECT
  - nube_1

# 国内流量组 (Domestic)
# 国内默认走 DIRECT (直连)，当国内服务被墙时可以手动切到代理
- name: Domestic
  type: select
  proxies:
  - DIRECT
  - Proxy

# 其他/漏网之鱼组 (Others)
# 当流量没有匹配到任何规则时的最终去处，通常为了防止 IP 泄露，默认全部走代理
- name: Others
  type: select
  proxies:
  - Proxy
  - DIRECT
  - Domestic

# 科技服务
- name: Microsoft
  type: select
  proxies:
  - Proxy
  - DIRECT

- name: AI Suite
  type: select
  proxies:
  - Proxy
  - DIRECT
  - nube_1

- name: Google FCM
  type: select
  proxies:
  - Proxy
